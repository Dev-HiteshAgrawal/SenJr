# SenJr — Netlify (Vite SPA + serverless API)
# API routes are implemented as Netlify Functions and proxied from /api/*
#
# Vite inlines import.meta.env.VITE_* at BUILD time — every VITE_* variable must be
# available in Netlify “Build” environment (use “Same variable for all deploy contexts”
# or duplicate per context). Server-only vars need “Functions” runtime; they are not bundled.

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

  [build.environment]
    NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  # Avoid bundling firebase-admin (native / dynamic requires)
  external_node_modules = ["firebase-admin"]

# API proxies must run before the SPA fallback
[[redirects]]
  from = "/api/livekit-token"
  to = "/.netlify/functions/livekit-token"
  status = 200

[[redirects]]
  from = "/api/runtime-config"
  to = "/.netlify/functions/runtime-config"
  status = 200

[[redirects]]
  from = "/api/ai-tutor"
  to = "/.netlify/functions/ai-tutor"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers (aligned with previous production config)
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://www.gstatic.com https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleusercontent.com https://*.firebaseapp.com https://*.googleapis.com https://*.firebasestorage.app https://firebasestorage.googleapis.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.firebaseapp.com https://*.firebasestorage.app https://*.livekit.cloud wss://*.livekit.cloud https://firebasestorage.googleapis.com https://www.googletagmanager.com https://www.google-analytics.com https://analytics.google.com https://accounts.google.com https://www.google.com; media-src 'self' blob: https://*.firebasestorage.app https://firebasestorage.googleapis.com; frame-src 'self' https://*.firebaseapp.com https://accounts.google.com https://www.google.com;"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=self, microphone=self, geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
